
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Match Score</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; }
        #score { font-size: 2em; color: #2a7ae2; margin: 20px 0; }
    </style>
</head>
<body>
    <h1>Live Match Score</h1>
    <div>
        <label for="matchId">Match ID:</label>
        <input type="text" id="matchId" placeholder="Enter match ID">
        <button onclick="subscribeScore()">Subscribe</button>
    </div>
    <div id="score">Score: --</div>
    <div id="messages"></div>
    <script>
        let stompClient = null;
        let subscription = null;

        function subscribeScore() {
            const matchId = document.getElementById('matchId').value.trim();
            if (!matchId) {
                alert('Please enter a match ID.');
                return;
            }
            if (stompClient && subscription) {
                subscription.unsubscribe();
            }
            const socket = new SockJS('http://127.0.0.1:8080/ws');
            stompClient = Stomp.over(socket);
            stompClient.connect({}, function(frame) {
                document.getElementById('messages').innerHTML += '<p><em>Connected: ' + frame + '</em></p>';
                subscription = stompClient.subscribe('/topic/match/' + matchId, function(message) {
                    const data = JSON.parse(message.body);
                    document.getElementById('score').textContent = `Score: ${data.score1} - ${data.score2}`;
                    document.getElementById('messages').innerHTML += '<p>Update: ' + message.body + '</p>';
                    // Disconnect if match is finished
                    if (data.status === 'FINISHED') {
                        document.getElementById('messages').innerHTML += '<p style="color:green"><em>Match finished. Disconnecting...</em></p>';
                        if (stompClient) {
                            stompClient.disconnect(function() {
                                document.getElementById('messages').innerHTML += '<p><em>Disconnected from server.</em></p>';
                            });
                        }
                    }
                });
            }, function(error) {
                document.getElementById('messages').innerHTML += '<p style="color:red"><em>Connection error: ' + error + '</em></p>';
            });
        }
    </script>
</body>
</html>

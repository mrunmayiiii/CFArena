<!--
  WebSocket Test Page - connects to Spring STOMP backend via SockJS.
  Subscribe to any /topic/ destination and see messages in real time.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebSocket Test</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        #status { font-weight: bold; margin: 10px 0; }
        .connected { color: green; }
        .disconnected { color: red; }
        #messages { border: 1px solid #ccc; padding: 10px; margin-top: 10px; max-height: 400px; overflow-y: auto; }
        input, button { padding: 6px 12px; margin: 4px; }
    </style>
</head>
<body>
    <h1>WebSocket Test Page</h1>

    <div>
        <label>Topic to subscribe:</label>
        <input type="text" id="topicInput" placeholder="/topic/match/12345" value="/topic/match/">
    </div>

    <div>
        <button onclick="connect()">Connect</button>
        <button onclick="disconnect()">Disconnect</button>
    </div>

    <div id="status" class="disconnected">Disconnected</div>
    <div id="messages"></div>

    <script>
        let stompClient = null;
        let subscription = null;

        function connect() {
            const topic = document.getElementById('topicInput').value.trim();
            if (!topic) {
                alert('Please enter a topic to subscribe to.');
                return;
            }

            if (stompClient && stompClient.connected) {
                disconnect();
            }

            const socket = new SockJS('http://127.0.0.1:8080/ws');
            stompClient = Stomp.over(socket);

            stompClient.connect({}, function(frame) {
                document.getElementById('status').textContent = 'Connected ✅';
                document.getElementById('status').className = 'connected';
                addMessage('🔗 Connected: ' + frame, 'green');

                subscription = stompClient.subscribe(topic, function(message) {
                    const data = JSON.parse(message.body);
                    addMessage('📩 ' + JSON.stringify(data, null, 2), 'blue');
                });

                addMessage('📡 Subscribed to: ' + topic, 'green');
            }, function(error) {
                document.getElementById('status').textContent = 'Connection Error ❌';
                document.getElementById('status').className = 'disconnected';
                addMessage('❌ Error: ' + error, 'red');
            });
        }

        function disconnect() {
            if (subscription) {
                subscription.unsubscribe();
                subscription = null;
            }
            if (stompClient) {
                stompClient.disconnect();
                stompClient = null;
            }
            document.getElementById('status').textContent = 'Disconnected';
            document.getElementById('status').className = 'disconnected';
            addMessage('🔌 Disconnected', 'gray');
        }

        function addMessage(text, color) {
            const div = document.getElementById('messages');
            div.innerHTML += '<p style="color:' + color + '; margin: 4px 0;"><code>' + text + '</code></p>';
            div.scrollTop = div.scrollHeight;
        }
    </script>
</body>
</html>
